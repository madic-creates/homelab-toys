version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*net/http.Response).Body.Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.Copy

  exclusions:
    paths:
      - docs
    rules:
      - path: _test\.go
        linters:
          - errcheck
