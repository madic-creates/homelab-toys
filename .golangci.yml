version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.Copy
    staticcheck:
      # QF1011 ("could omit type from declaration") fires on
      # `var _ Interface = value` — but that pattern is the canonical Go
      # idiom for compile-time interface conformance assertions, and we
      # use it deliberately. Keep all other staticcheck/QF/etc. checks on.
      checks:
        - all
        - -QF1011

  exclusions:
    paths:
      - docs
    rules:
      - path: _test\.go
        linters:
          - errcheck
