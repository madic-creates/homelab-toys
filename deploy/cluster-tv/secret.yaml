# Replace the placeholder ARGOCD_TOKEN with a real JWT issued by:
#
#   argocd login <argocd-host> --username admin
#   argocd account generate-token --account cluster-tv
#
# The account must exist in argocd-cm (`accounts.cluster-tv: apiKey`) and be
# bound to a role with cluster-wide read on applications. The default
# `readonly` role works:
#
#   policy.csv: |
#     g, cluster-tv, role:readonly
#
# In production, store this Secret encrypted (sops, sealed-secrets, etc.) and
# never commit the plaintext value.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-tv-env
  namespace: cluster-tv
type: Opaque
stringData:
  ARGOCD_TOKEN: REPLACE_WITH_ARGOCD_LOCAL_USER_TOKEN
